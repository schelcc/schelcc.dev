# baseURL = 'https://schelcc.dev'
# languageCode = 'en-us'
# title = 'schelcc'

baseURL = "https://schelcc.dev"
contentdir = "content"
publishdir = "publish"

canonifyurls = true
relativeURLS = false

title = "schelcc"
languageCode = "en-US"


# https://github.com/schnerring/hugo-theme-gruvbox
[markup]
  # (Optional) To be able to use all Prism plugins, the theme enables unsafe
  # rendering by default
  #_merge = "deep"

[build]
  # Merge build config of the theme
  _merge = "deep"

[outputs]
  # The search requires rendering the theme's `searchIndex` output format
  home = ["html", "searchIndex"]

# This hopefully will be simpler in the future.
# See: https://github.com/schnerring/hugo-theme-gruvbox/issues/16
[module]
  [[module.imports]]
    path = "github.com/schnerring/hugo-theme-gruvbox"
  [[module.imports]]
    path = "github.com/schnerring/hugo-mod-json-resume"
    [[module.imports.mounts]]
      # This will add the sample Richard Hendricks CV data
      source = "data"
      target = "data"
    [[module.imports.mounts]]
      source = "layouts"
      target = "layouts"
    [[module.imports.mounts]]
      source = "assets/css/json-resume.css"
      target = "assets/css/critical/44-json-resume.css"
  [[module.mounts]]
    # required by hugo-mod-json-resume
    source = "node_modules/simple-icons/icons"
    target = "assets/simple-icons"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "node_modules/prismjs"
    target = "assets/prismjs"
  [[module.mounts]]
    source = "node_modules/prism-themes/themes"
    target = "assets/prism-themes"
  [[module.mounts]]
    source = "node_modules/typeface-fira-code/files"
    target = "static/fonts"
  [[module.mounts]]
    source = "node_modules/typeface-roboto-slab/files"
    target = "static/fonts"
  [[module.mounts]]
    source = "node_modules/@tabler/icons/icons"
    target = "assets/tabler-icons"
  [[module.mounts]]
    # Add hugo_stats.json to Hugo's server watcher
    source = "hugo_stats.json"
    target = "assets/watching/hugo_stats.json"

[params]
  defaultTheme = "light"
  themeColor = "red"
  themeContrast = "soft"
  author = "Cole Scheller"
  subtitle = "Software Engineer"
  description = "C++ Enthusiast"

  [params.logo]
    text = "schelcc.dev"
    url = "/"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/blog"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about"
    weight = 11
  [[menu.main]]
    identifier = "CV"
    name = "CV"
    url = "https://resume.schelcc.dev"
    weight = 12
  [[menu.main]]
    identifier = "photos"
    name = "Photos"
    url = "https://photos.schelcc.dev"
    weight = 13